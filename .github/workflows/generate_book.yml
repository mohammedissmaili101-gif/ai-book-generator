name: 📚 Generate Professional Ebook

on:
  workflow_dispatch:
    inputs:
      book_title:
        description: '📖 Book Title + Full Description (e.g: "The Secret to Financial Freedom: A complete guide for people stuck in 9-5 jobs who want to build passive income streams, escape debt, and achieve true financial independence in 12 months")'
        required: true
        type: string
      author_name:
        description: '✍️ Author Name'
        required: false
        default: 'Professional Author'
        type: string
      language:
        description: '🌍 Language'
        required: true
        default: 'en'
        type: choice
        options:
          - en
          - fr
          - ar
          - es
          - de
          - pt
          - it
          - zh
          - ja
          - ru
          - tr
          - nl
          - ko
          - hi
          - id
      book_format:
        description: '📦 Format — pdf = sell directly (TikTok/Gumroad) | kdp = Amazon KDP print+digital'
        required: true
        default: 'pdf'
        type: choice
        options:
          - pdf
          - kdp
      action:
        description: '⚡ Action'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate
          - suggest

jobs:
  create-book:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 📚 Generate Book
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOOK_TITLE: ${{ github.event.inputs.book_title }}
          BOOK_LANGUAGE: ${{ github.event.inputs.language }}
          BOOK_AUTHOR: ${{ github.event.inputs.author_name }}
          BOOK_FORMAT: ${{ github.event.inputs.book_format }}
          ACTION: ${{ github.event.inputs.action }}
        run: python generate_book.py

      - name: 🌐 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true

      - name: 📊 Show Results
        run: |
          echo "=================================="
          echo "✅ BOOK GENERATED SUCCESSFULLY!"
          echo "=================================="
          if [ -f output/metadata.json ]; then cat output/metadata.json; fi
          echo ""
          echo "📖 Files:"
          ls -la output/
          echo ""
          echo "🌐 Live at:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.repository_name }}/"

      - name: 📤 Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebook-${{ github.event.inputs.book_title }}
          path: output/
          retention-days: 30
